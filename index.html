<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS DevOps Project</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
        }

        .container{
            width:450px;
            padding:40px;
            text-align:center;
            border-radius:20px;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(10px);
            box-shadow:0 8px 25px rgba(0,0,0,0.4);
            color:white;
        }

        h1{
            font-size:42px;
            margin-bottom:20px;
            color:#00e5ff;
        }

        h2{
            color:#00ff88;
            margin-bottom:15px;
        }

        p{
            font-size:20px;
            margin-bottom:10px;
        }

        .pipeline{
            margin-top:20px;
            font-size:18px;
            color:#ffffff;
        }

        @media(max-width:500px){
            .container{
                width:90%;
                padding:25px;
            }

            h1{
                font-size:32px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>AWS DevOps Project Final Success 🚀</h1>

        <p>CI/CD Pipeline Working Successfully</p>

        <h2>Deployment Successful ✅</h2>

        <div class="pipeline">
            GitHub → Jenkins → Docker → AWS EC2
        </div>
    </div>

</body>
</html>
